<script>
// ── Counter engine ──
function getStats() {
  try { const r = localStorage.getItem('wc_site_stats'); return r ? JSON.parse(r) : {uv:0,pv:0,today:0,lastVisit:''}; }
  catch(e) { return {uv:0,pv:0,today:0,lastVisit:''}; }
}
function saveStats(s) { localStorage.setItem('wc_site_stats', JSON.stringify(s)); }

let stats = getStats();
const today = new Date().toISOString().slice(0,10);
const hasVisited = localStorage.getItem('wc_uv_flag');
if (!hasVisited) { stats.uv += 1; localStorage.setItem('wc_uv_flag','1'); }
if (stats.lastVisit !== today) { stats.today = 1; } else { stats.today += 1; }
stats.pv += 1; stats.lastVisit = today; saveStats(stats);
document.getElementById('visitCount').textContent = stats.uv;
document.getElementById('todayCount').textContent = stats.today;
document.getElementById('totalViews').textContent = stats.pv;

// ── QR Code ──
const pageUrl = 'https://datamenu.xyz/';
document.getElementById('qrCode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&bgcolor=ffffff&data=' + encodeURIComponent(pageUrl);

// ── Share buttons ──
const shareText = encodeURIComponent('🏆 Dob Guski 的世界杯小站 | 2026 FIFA World Cup Live — 实时比分·球员档案·Polymarket预测');
const shareUrl = encodeURIComponent(pageUrl);
document.getElementById('shareX').href = 'https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl;
document.getElementById('shareFB').href = 'https://www.facebook.com/sharer/sharer.php?u=' + shareUrl;
document.getElementById('shareWA').href = 'https://wa.me/?text=' + shareText + '%20' + shareUrl;

function copyLink() {
  navigator.clipboard.writeText(pageUrl).then(() => {
    const t = document.getElementById('copiedToast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  });
}

// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i=0;i<50;i++) {
  const s = document.createElement('div'); s.className='star';
  const sz = Math.random()*2.2+1;
  s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-delay:'+Math.random()*3+'s;animation-duration:'+(Math.random()*2+1.5)+'s';
  starsEl.appendChild(s);
}
</script>
